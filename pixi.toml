[workspace]
authors = ["JH Wang <1125623896@qq.com>"]
channels = ["conda-forge"]
name = "bacteria_analysis"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
test = "pytest -q"
preprocess = "python scripts/run_preprocessing.py"
reliability = "python scripts/run_reliability.py"
geometry = "python scripts/run_geometry.py"
rsa = "python scripts/run_rsa.py"


[dependencies]
python = "3.11.*"
pandas = ">=2.2,<3"
pyarrow = ">=15,<22"
numpy = ">=1.26,<3"
pytest = ">=8.0,<9"
matplotlib = ">=3.8,<4"
seaborn = ">=0.13,<0.14"
openpyxl = ">=3.1,<4"
